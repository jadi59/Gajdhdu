<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>VaiperX ULTRA PRO</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{

background:#555;

overflow:hidden;

}

/* BACKGROUND */

.bg{

position:fixed;

inset:0;

background:url("https://images.unsplash.com/photo-1520975958225-4f6f7a6d3b14?auto=format&fit=crop&w=1600&q=80");

background-size:cover;

background-position:center;

filter:blur(8px);

transform:scale(1.1);

}

.overlay{

position:fixed;

inset:0;

background:rgba(0,0,0,.45);

}

/* TOAST */

#toast{

position:fixed;

top:20px;

left:50%;

transform:translateX(-50%);

background:#ff0033;

padding:12px 18px;

color:white;

border-radius:12px;

font-weight:700;

opacity:0;

transition:.3s;

z-index:999999;

}

#toast.show{

opacity:1;

}

/* LOGIN */

#login{

position:fixed;

inset:0;

display:flex;

justify-content:center;

align-items:center;

z-index:9999;

}

.box{

width:340px;

background:#111;

padding:25px;

border-radius:20px;

border:1px solid red;

}

.box h1{

color:white;

text-align:center;

margin-bottom:20px;

}

input{

width:100%;

padding:14px;

border:none;

border-radius:12px;

outline:none;

}

button{

width:100%;

padding:14px;

border:none;

margin-top:12px;

border-radius:12px;

background:#ff0033;

color:white;

font-weight:700;

}

/* APP */

#app{

display:none;

position:fixed;

inset:0;

overflow:auto;

z-index:50000;

padding-top:40px;

}

.window{

width:90%;

max-width:420px;

margin:auto;

background:#111;

padding:25px;

border-radius:25px;

color:white;

}

.row{

display:flex;

justify-content:space-between;

padding:14px;

background:#222;

border-radius:12px;

margin-top:10px;

}

.switch{

width:40px;

height:20px;

background:#444;

border-radius:20px;

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="overlay"></div>

<div id="toast"></div>


<!-- LOGIN -->

<div id="login">

<div class="box">

<h1>ENTER KEY</h1>

<input
id="key"
placeholder="VIP001"
>

<button onclick="login()">

LOGIN

</button>

</div>

</div>


<!-- MENU -->

<div id="app">

<div class="window">

<h2>

VAIPERX MENU

</h2>

<div class="row">

<span>หัว</span>

<div class="switch"></div>

</div>

<div class="row">

<span>ดูดหัว</span>

<div class="switch"></div>

</div>

<div class="row">

<span>กันแบน</span>

<div class="switch"></div>

</div>

<div class="row">

<span>กันดำ</span>

<div class="switch"></div>

</div>

</div>

</div>



<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getFirestore,

doc,

getDoc,

setDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyBdSsDIgiB2RvqC0udxgp8YNyBFDsksDUw",
  authDomain: "reczssa.firebaseapp.com",
  databaseURL: "https://reczssa-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "reczssa",
  storageBucket: "reczssa.firebasestorage.app",
  messagingSenderId: "726475292690",
  appId: "1:726475292690:web:12d844b3b605ad650cd8cb"
};

const app=

initializeApp(

firebaseConfig

);

const db=

getFirestore(

app

);



function toast(text){

const t=

document.getElementById(

"toast"

);

t.innerText=text;

t.classList.add(

"show"

);

setTimeout(()=>{

t.classList.remove(

"show"

)

},2000)

}



function device(){

let id=

localStorage.getItem(

"device"

);

if(!id){

id=

crypto.randomUUID();

localStorage.setItem(

"device",

id

);

}

return id;

}



window.login=

async()=>{

try{

const key=

document

.getElementById(

"key"

)

.value

.trim()

.toUpperCase();



if(!key){

toast("ENTER KEY");

return;

}



const ref=

doc(

db,

"keys",

key

);



const snap=

await getDoc(

ref

);



if(

!snap.exists()

){

toast(

"INVALID KEY ❌"

);

return;

}



const data=

snap.data();



if(

data.banned===true

){

toast(

"KEY BANNED 🚫"

);

return;

}



const expire=

new Date(

data.expire

).getTime();



if(

Date.now()

>

expire

){

toast(

"KEY EXPIRED ⏳"

);

return;

}



const dev=

device();



if(

!data.device ||

data.device===""

){

await setDoc(

ref,

{

...data,

device:dev

},

{

merge:true

}

);

}

else if(

data.device!==dev

){

toast(

"DEVICE LOCKED 🚫"

);

return;

}



toast(

"LOGIN SUCCESS ✅"

);



document

.getElementById(

"login"

)

.remove();



document

.getElementById(

"app"

)

.style.display=

"block";



}

catch(e){

console.log(e);

toast(

"FIREBASE ERROR ❌"

);

}

}


</script>

</body>

</html>
