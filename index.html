<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>ReczssAA</title>

<link rel="apple-touch-icon" href="https://i.postimg.cc/Gt4fVkYs/IMG-0020.png">
<link rel="icon" type="image/png" href="https://i.postimg.cc/Gt4fVkYs/IMG-0020.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* ===== LOCK SYSTEM ===== */
body{
    margin:0;
    font-family:Inter;
    background:#fff8f1;
    overflow:hidden;
}

/* LOGIN */
#loginScreen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    z-index:9999;
}

.login-box{
    width:320px;
    padding:25px;
    background:#111;
    border-radius:16px;
    border:1px solid #333;
    text-align:center;
    color:white;
}

.login-box input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:none;
}

.login-box button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:orange;
    font-weight:bold;
}

/* APP HIDE */
#app{
    display:none;
}

/* ===== YOUR ORIGINAL UI (UNCHANGED) ===== */

:root{
    --bg:#fff8f1;
    --text:#1f1f1f;
    --orange:#ff8c00;
    --green:#00c978;
}

/* (ย่อ CSS เดิมของคุณไว้ ไม่ต้องแก้ UI เลย) */

.window{
    width:95%;
    max-width:1350px;
    height:92vh;
    margin:20px auto;
    background:white;
    border-radius:34px;
    display:flex;
}

/* (คุณสามารถวาง CSS เดิมทั้งหมดของคุณต่อจากนี้ได้เลย) */

</style>
</head>

<body>

<!-- 🔒 LOGIN -->
<div id="loginScreen">
    <div class="login-box">
        <h2>ENTER KEY</h2>

        <input id="keyInput" placeholder="KEY...">

        <button onclick="login()">LOGIN</button>

        <p id="msg"></p>
    </div>
</div>

<!-- 🔓 APP -->
<div id="app">

<div class="window">

    <!-- 🔥 UI เดิมคุณ (ผมไม่ลบเลย เอามาวางตรงนี้) -->

    <div class="sidebar">
        <div class="logo">
            <img src="https://i.postimg.cc/Gt4fVkYs/IMG-0020.png">
            <div>
                <h1>Reczssa</h1>
                <p>XX</p>
            </div>
        </div>

        <div class="key-box">
            <span>PREMIUM ACCESS KEY</span>
            <h2>858525</h2>
        </div>

        <div class="nav">
            <div class="nav-item active"><div class="nav-icon">⚡</div><span>Protection</span></div>
            <div class="nav-item"><div class="nav-icon">🛡️</div><span>Security</span></div>
            <div class="nav-item"><div class="nav-icon">🎯</div><span>Target</span></div>
            <div class="nav-item"><div class="nav-icon">⚙️</div><span>Settings</span></div>
        </div>
    </div>

    <div class="main">
        <h2>System Connected</h2>

        <div class="grid">
            <div class="card">Protection Modules</div>
            <div class="card">System Controls</div>
        </div>
    </div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_ID",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "YOUR_ID",
appId: "YOUR_APP"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* DEVICE */
function device(){
let id = localStorage.getItem("device");
if(!id){
id = crypto.randomUUID();
localStorage.setItem("device", id);
}
return id;
}

/* LOGIN */
window.login = async () => {

const key = document.getElementById("keyInput").value.trim();
const msg = document.getElementById("msg");

if(!key){
msg.innerText = "ENTER KEY";
return;
}

const ref = doc(db,"keys",key);
const snap = await getDoc(ref);

if(!snap.exists()){
msg.innerText = "INVALID KEY";
return;
}

const data = snap.data();

/* expire */
if(Date.now() > data.expire){
msg.innerText = "EXPIRED";
return;
}

/* device lock */
const dev = device();

if(!data.device){
await setDoc(ref,{
...data,
device: dev
});
}
else if(data.device !== dev){
msg.innerText = "DEVICE LOCKED";
return;
}

/* success */
document.getElementById("loginScreen").style.display="none";
document.getElementById("app").style.display="block";

};

</script>

</body>
</html>
