<script type="module">
import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
doc,
getDoc,
setDoc
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const firebaseConfig={
apiKey:"AIzaSyBdSsDIgiB2RvqC0udxgp8YNyBFDsksDUw",
authDomain:"reczssa.firebaseapp.com",
projectId:"reczssa",
storageBucket:"reczssa.firebasestorage.app",
messagingSenderId:"726475292690",
appId:"1:726475292690:web:12d844b3b605ad650cd8cb"
};
const app=
initializeApp(
firebaseConfig
);
const db=
getFirestore(
app
);
function toast(text){
const t=
document.getElementById(
"toast"
);
t.innerText=text;
t.classList.add(
"show"
);
setTimeout(()=>{
t.classList.remove(
"show"
)
},2000)
}
function deviceID(){
let id=
localStorage.getItem(
"device"
);
if(!id){
id=
crypto.randomUUID();
localStorage.setItem(
"device",
id
);
}
return id;
}
window.login=
async()=>{
try{
const key=
document
.getElementById(
"key"
)
.value
.trim()
.toUpperCase();
if(!key){
toast(
"ENTER KEY"
);
return;
}
const ref=
doc(
db,
"keys",
key
);
const snap=
await getDoc(
ref
);
if(
!snap.exists()
){
toast(
"INVALID KEY ❌"
);
return;
}
const data=
snap.data();
if(
data.banned===true
){
toast(
"KEY BANNED 🚫"
);
return;
}
const expire=
new Date(
data.expire
).getTime();
if(
Date.now()
>
expire
){
toast(
"KEY EXPIRED ⏳"
);
return;
}
const dev=
deviceID();
if(
!data.device ||
data.device===""
){
await setDoc(
ref,
{
...data,
device:dev,
used:true
},
{
merge:true
}
);
}
else if(
data.device!==dev
){
toast(
"DEVICE LOCKED 🚫"
);
return;
}
toast(
"LOGIN SUCCESS ✅"
);
document
.getElementById(
"login"
)
.style.display=
"none";
document
.getElementById(
"app"
)
.style.display=
"block";
}
catch(e){
console.log(e);
toast(
"FIREBASE ERROR ❌"
);
}
}
